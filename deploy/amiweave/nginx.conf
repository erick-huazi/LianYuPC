map $http_origin $cors_origin {
    default "";
    "https://amiweave.com"     $http_origin;
    "https://www.amiweave.com" $http_origin;
}

map $http_x_forwarded_proto $upstream_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name amiweave.com www.amiweave.com;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(doc\.html|swagger-ui\.html|swagger-ui/|v3/api-docs|webjars/) {
        return 404;
    }

    location ^~ /api/public/files/square-avatars-thumb/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_proto;
        proxy_hide_header Cache-Control;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, lianyu-token, X-Trace-Id, X-LianYu-Output-Language, X-LianYu-Ui-Language, X-LianYu-Client, X-LianYu-Device-Id, X-LianYu-Timestamp, X-LianYu-Nonce, X-LianYu-Signature" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "3600" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_proto;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 10m;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $upstream_proto;
        proxy_read_timeout 86400s;
    }

    location / {
        default_type application/json;
        return 200 '{"name":"Amiweave","status":"ok"}';
    }
}
