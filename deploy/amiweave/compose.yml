name: amiweave

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "127.0.0.1:${AMIWEAVE_ORIGIN_PORT:-18080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        APP_REVISION: ${APP_REVISION:-dev}
    image: amiweave/backend:${APP_REVISION:-dev}
    restart: unless-stopped
    mem_limit: 1152m
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MINIO_ENDPOINT: http://minio:9000
      SERVER_PORT: 8080
      LIANYU_STORAGE_MILVUS_ENABLED: "false"
      LIANYU_AI_ALLOW_PRIVATE_BASE_URLS: "false"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx768m -XX:MaxMetaspaceSize=256m"
      CORS_ALLOWED_ORIGINS: ${AMIWEAVE_PUBLIC_ORIGINS:-https://amiweave.com,https://www.amiweave.com}
      WS_ALLOWED_ORIGIN_PATTERNS: ${AMIWEAVE_PUBLIC_ORIGINS:-https://amiweave.com,https://www.amiweave.com}
      TZ: Asia/Singapore
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/auth/captcha"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    mem_limit: 768m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lianyu
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --innodb-buffer-pool-size=256M
      - --max-connections=100
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    mem_limit: 512m
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
