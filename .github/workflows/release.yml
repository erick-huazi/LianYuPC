name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing version tag to publish (for example v0.3.0-rc.1)"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

permissions:
  contents: write

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B test

  verify-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test -- --run

  desktop:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Verify tag matches project versions
        shell: pwsh
        run: |
          $frontendVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $backendVersion = ([xml](Get-Content ../backend/pom.xml -Raw)).project.version
          if ("v$frontendVersion" -ne "${{ env.RELEASE_TAG }}") {
            throw "Tag ${{ env.RELEASE_TAG }} does not match frontend version v$frontendVersion"
          }
          if ($backendVersion -ne $frontendVersion) {
            throw "Backend version $backendVersion does not match frontend version $frontendVersion"
          }
      - run: npm run electron:build
      - name: Create checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem release -Recurse -File
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii release/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: lianyu-windows
          path: frontend/release/**/*
          if-no-files-found: error

  publish:
    needs: [verify-backend, verify-frontend, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          name: lianyu-windows
          path: release-assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0)
          gh release create "${RELEASE_TAG}" "${assets[@]}" \
            --verify-tag \
            --title "LianYu ${RELEASE_TAG}" \
            --generate-notes
