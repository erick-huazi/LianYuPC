name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test -- --run

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cp .env.example .env
      - run: docker compose -f docker-compose.yml config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.lite.yml config --quiet
      - name: Validate isolated production stack
        run: |
          docker compose --project-name amiweave --env-file .env -f deploy/amiweave/compose.yml config --quiet
          docker compose --project-name amiweave --env-file .env -f deploy/amiweave/compose.yml config --format json |
            jq -e '[.services.mysql, .services.redis, .services.rabbitmq, .services.minio] | all(.environment.APP_REVISION == null)'
          sh -n deploy/amiweave/deploy.sh

  lite-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install playwright==1.55.0
      - run: python -m playwright install --with-deps chromium
      - name: Generate local credentials
        shell: pwsh
        run: ./scripts/init-local.ps1
      - name: Start Lite stack
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml up -d --build
      - name: Wait for API
        run: curl --fail --retry 30 --retry-delay 3 --retry-all-errors http://localhost:8088/api/auth/captcha
      - name: Run end-to-end suite
        run: python scripts/e2e/lianyu_e2e.py
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lianyu-e2e-artifacts
          path: scripts/e2e/artifacts/
          if-no-files-found: ignore
      - name: Show service logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml logs --no-color --tail=300
      - name: Stop Lite stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.lite.yml down -v
