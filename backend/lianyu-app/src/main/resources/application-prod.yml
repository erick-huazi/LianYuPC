# 生产环境：关闭 API 文档 UI，避免暴露接口面
knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

lianyu:
  api-docs:
    enabled: false

# WebSocket 仅允许云端域名连接（防 CSWSH）
ws:
  allowed-origin-patterns: "${WS_ALLOWED_ORIGIN_PATTERNS:https://amiweave.com,https://www.amiweave.com}"
