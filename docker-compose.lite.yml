# Lite local override: keeps MySQL/Redis/RabbitMQ/MinIO, skips Milvus and TLS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.lite.yml up -d --build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
      args:
        APP_REVISION: ${APP_REVISION:-dev}
    image: lianyu-pc/frontend-lite:${APP_REVISION:-dev}
    container_name: lianyu-frontend-lite
    restart: unless-stopped
    ports:
      - "${LIANYU_FRONTEND_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    environment:
      LIANYU_STORAGE_MILVUS_ENABLED: "false"
      LIANYU_AI_ALLOW_PRIVATE_BASE_URLS: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:${LIANYU_FRONTEND_PORT:-8088},http://127.0.0.1:${LIANYU_FRONTEND_PORT:-8088}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      milvus:
        condition: service_healthy
        required: false

  api-gateway:
    profiles: ["tls"]

  milvus:
    profiles: ["vector"]
